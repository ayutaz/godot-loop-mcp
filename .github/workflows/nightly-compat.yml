name: Nightly Compatibility

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-compat
  cancel-in-progress: true

jobs:
  resolve-godot-support:
    runs-on: ubuntu-latest
    outputs:
      nightly_matrix: ${{ steps.resolve.outputs.nightly_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve nightly Godot matrix
        id: resolve
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./scripts/actions/get-godot-support-matrix.ps1 -FloorVersion "4.4.1-stable"

  bridge-smoke-matrix:
    needs:
      - resolve-godot-support
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-godot-support.outputs.nightly_matrix) }}
    uses: ./.github/workflows/reusable-godot-smoke.yml
    with:
      runner: ${{ matrix.os }}
      godot_version: ${{ matrix.godot_version }}
      timeout_minutes: 20
      artifact_name: bridge-smoke-${{ matrix.os }}-${{ matrix.godot_version }}
      artifact_paths: |
        .artifacts/bridge-smoke
        .godot/mcp
      smoke_command: ./scripts/actions/run-bridge-smoke.ps1 -RepoRoot "$env:GITHUB_WORKSPACE" -GodotBinaryPath "$env:GODOT_LOOP_MCP_GODOT_BIN" -ArtifactsDir "$env:GITHUB_WORKSPACE/.artifacts/bridge-smoke"
      retention_days: 14
