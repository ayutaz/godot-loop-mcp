name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to package and publish.
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}

concurrency:
  group: release-${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  resolve-godot-support:
    runs-on: ubuntu-latest
    outputs:
      latest_stable_version: ${{ steps.resolve.outputs.latest_stable_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Resolve supported Godot versions
        id: resolve
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./scripts/actions/get-godot-support-matrix.ps1 -FloorVersion "4.4.1-stable"

  server-check:
    uses: ./.github/workflows/reusable-server-check.yml
    with:
      artifact_name: release-server-bootstrap
      checkout_fetch_depth: 0
      checkout_ref: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
      release_tag: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
      retention_days: 30

  bridge-smoke:
    needs:
      - server-check
    uses: ./.github/workflows/reusable-godot-smoke.yml
    with:
      runner: windows-latest
      checkout_fetch_depth: 0
      checkout_ref: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
      godot_version: 4.4.1-stable
      timeout_minutes: 15
      artifact_name: release-smoke-logs
      artifact_paths: |
        .artifacts/bridge-smoke
        .godot/mcp
      smoke_command: ./scripts/actions/run-bridge-smoke.ps1 -RepoRoot "$env:GITHUB_WORKSPACE" -GodotBinaryPath "$env:GODOT_LOOP_MCP_GODOT_BIN" -ArtifactsDir "$env:GITHUB_WORKSPACE/.artifacts/bridge-smoke"
      retention_days: 30

  verification-smoke:
    needs:
      - resolve-godot-support
      - server-check
    uses: ./.github/workflows/reusable-godot-smoke.yml
    with:
      runner: windows-latest
      checkout_fetch_depth: 0
      checkout_ref: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
      godot_version: ${{ needs.resolve-godot-support.outputs.latest_stable_version }}
      timeout_minutes: 20
      artifact_name: release-test-reports
      artifact_paths: |
        .godot/mcp/test-reports
        .godot/mcp/audit.log
      smoke_command: npm --prefix packages/server run smoke:m4
      retention_days: 30

  packaged-install-smoke:
    needs:
      - resolve-godot-support
      - server-check
    uses: ./.github/workflows/reusable-godot-smoke.yml
    with:
      runner: windows-latest
      checkout_fetch_depth: 0
      checkout_ref: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
      godot_version: ${{ needs.resolve-godot-support.outputs.latest_stable_version }}
      timeout_minutes: 20
      artifact_name: release-packaged-install-smoke
      artifact_paths: |
        .artifacts/packaged-install-smoke
      smoke_command: ./scripts/actions/run-packaged-install-smoke.ps1 -RepoRoot "$env:GITHUB_WORKSPACE" -GodotBinaryPath "$env:GODOT_LOOP_MCP_GODOT_BIN" -ArtifactsDir "$env:GITHUB_WORKSPACE/.artifacts/packaged-install-smoke" -PackageVersion "${{ env.RELEASE_TAG }}"
      retention_days: 30

  package-addon:
    runs-on: ubuntu-latest
    needs:
      - bridge-smoke
      - packaged-install-smoke
      - verification-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Package addon zip
        id: package_addon
        shell: pwsh
        run: ./scripts/actions/package-addon.ps1 -RepoRoot "${{ github.workspace }}" -Version "${{ env.RELEASE_TAG }}" -OutputDir "${{ github.workspace }}/dist/release"

      - name: Upload addon package
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-addon
          path: ${{ github.workspace }}/dist/release/godot-loop-mcp-addon-*.zip
          if-no-files-found: error
          retention-days: 30

  package-server:
    runs-on: ubuntu-latest
    needs:
      - bridge-smoke
      - packaged-install-smoke
      - verification-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22.14.0
          cache: npm
          cache-dependency-path: packages/server/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: packages/server

      - name: Package server tarball
        run: |
          New-Item -ItemType Directory -Path "${{ github.workspace }}/dist/release" -Force | Out-Null
          $archiveName = (npm pack --pack-destination "${{ github.workspace }}/dist/release" | Select-Object -Last 1).Trim()
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($archiveName)) {
            throw "npm pack failed."
          }
          $sourcePath = Join-Path "${{ github.workspace }}/dist/release" $archiveName
          $targetPath = Join-Path "${{ github.workspace }}/dist/release" "godot-loop-mcp-server-${{ env.RELEASE_TAG }}.tgz"
          if (Test-Path -LiteralPath $targetPath) {
            Remove-Item -LiteralPath $targetPath -Force
          }
          Move-Item -LiteralPath $sourcePath -Destination $targetPath
        shell: pwsh
        working-directory: packages/server

      - name: Upload server package
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-server
          path: ${{ github.workspace }}/dist/release/*.tgz
          if-no-files-found: error
          retention-days: 30

  publish-github-release:
    runs-on: ubuntu-latest
    needs:
      - package-addon
      - package-server
      - bridge-smoke
      - packaged-install-smoke
      - verification-smoke
    permissions:
      contents: write
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Download addon package
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: release-addon
          path: ${{ github.workspace }}/dist/release

      - name: Download server package
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: release-server
          path: ${{ github.workspace }}/dist/release

      - name: Download smoke logs
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: release-smoke-logs
          path: ${{ github.workspace }}/dist/smoke-logs

      - name: Download test reports
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: release-test-reports
          path: ${{ github.workspace }}/dist/test-reports

      - name: Archive smoke logs
        shell: pwsh
        run: |
          $tag = "${{ env.RELEASE_TAG }}"
          $archivePath = Join-Path "${{ github.workspace }}/dist/release" "smoke-logs-$tag.zip"
          if (Test-Path -LiteralPath $archivePath) {
            Remove-Item -LiteralPath $archivePath -Force
          }
          Compress-Archive -Path "${{ github.workspace }}/dist/smoke-logs/*" -DestinationPath $archivePath -Force

      - name: Archive test reports
        shell: pwsh
        run: |
          $tag = "${{ env.RELEASE_TAG }}"
          $reportRoot = "${{ github.workspace }}/dist/test-reports"
          $reportDirectories = Get-ChildItem -Path $reportRoot -Directory -Recurse -Filter "test-reports"
          if ($reportDirectories.Count -eq 0) {
            throw "No test-reports directory was found in release-test-reports."
          }
          $archivePath = Join-Path "${{ github.workspace }}/dist/release" "test-reports-$tag.zip"
          if (Test-Path -LiteralPath $archivePath) {
            Remove-Item -LiteralPath $archivePath -Force
          }
          $pathsToArchive = $reportDirectories | ForEach-Object { $_.FullName }
          Compress-Archive -Path $pathsToArchive -DestinationPath $archivePath -Force

      - name: Write SHA256SUMS
        shell: pwsh
        run: ./scripts/actions/write-sha256.ps1 -InputDir "${{ github.workspace }}/dist/release"

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ env.RELEASE_TAG }}"
          $assets = Get-ChildItem -Path "${{ github.workspace }}/dist/release" -File | Sort-Object Name | ForEach-Object { $_.FullName }
          gh --version
          gh release view $tag *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          if ($releaseExists) {
            gh release upload $tag @assets --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "gh release upload failed for $tag."
            }
          } else {
            gh release create $tag @assets --verify-tag --title $tag --generate-notes
            if ($LASTEXITCODE -ne 0) {
              throw "gh release create failed for $tag."
            }
          }

  publish-npm:
    runs-on: ubuntu-latest
    needs:
      - bridge-smoke
      - packaged-install-smoke
      - verification-smoke
      - package-server
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && vars.NPM_PUBLISH_ENABLED == 'true' }}
    permissions:
      contents: read
      id-token: write
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/server/package-lock.json

      - name: Upgrade npm CLI for trusted publishing
        run: npm install --global npm@11.11.1

      - name: Print Node.js and npm versions
        shell: pwsh
        run: |
          "node=$(node --version)"
          "npm=$(npm --version)"

      - name: Install server dependencies
        run: npm ci
        working-directory: packages/server

      - name: Validate publish metadata
        shell: pwsh
        working-directory: packages/server
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          if ([bool]$package.private) {
            throw "package.json still sets private=true."
          }
          if (-not $package.bin."godot-loop-mcp-server") {
            throw "package.json is missing the godot-loop-mcp-server bin entry."
          }
          if ($package.publishConfig.access -ne "public") {
            throw "publishConfig.access must be public."
          }
          $binPath = Join-Path (Get-Location) $package.bin."godot-loop-mcp-server"
          if (-not (Test-Path -LiteralPath $binPath)) {
            throw "CLI entrypoint $binPath was not found."
          }

      - name: Publish dry run
        run: npm run publish:dry-run
        working-directory: packages/server

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        working-directory: packages/server
